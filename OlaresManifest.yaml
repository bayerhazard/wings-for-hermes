---
olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  wings: 1
metadata:
  name: wings
  icon: https://raw.githubusercontent.com/bayerhazard/wings-for-hermes/main/icon.png
  description: Wings for Hermes — AI Agent Web UI with chat, sessions, memory, skills, cron, profiles, workspaces
  appid: wings
  title: Wings for Hermes
  version: '1.5.0'
  categories:
    - Productivity_v112
    - Developer Tools
entrances:
  - name: wings
    port: 8787
    host: wings
    title: Wings for Hermes
    icon: https://raw.githubusercontent.com/bayerhazard/wings-for-hermes/main/icon.png
    openMethod: window
    authLevel: internal
spec:
  versionName: '1.5.0'
  upgradeDescription: |
    v1.5.0: Ring track color visible on sidebar bg, session search moved to sidebar footer, ring tooltip on hover only (no click menu), project pills and color dots hidden in Basic mode.
  fullDescription: |
    **Wings for Hermes** — AI Agent Web UI, forked from hermes-webui.

    **Full feature parity with Hermes Web UI:**
    - Chat with streaming, reasoning display, tool-call cards, approvals
    - Sessions: create, resume, search, pin, archive, projects, export
    - Memory: view and edit MEMORY.md / USER.md inline
    - Skills: list, preview, create, edit, delete (106+ skills)
    - Tasks: cron jobs — view, create, edit, run, pause/resume, run history
    - Profiles, workspaces with file browser, todos, themes

    **Shared-state architecture**
    Runs as a second, additive agent instance on the *same* HERMES_HOME as your existing Hermes Agent app. Sessions, memory, auth, and config are shared. The agent source is copied from the exact running gateway image at pod start, so the WebUI always runs version-matched code.

    **Auto-detection**
    On startup, the app automatically finds your Hermes Agent home directory — no manual path configuration needed. UID/GID is auto-detected from the hermesagent directory ownership.

    **Access**
    Protected by Olares SSO (internal). Set an additional app password in the app settings for defense in depth.

    **Requirements**
    - Requires the Hermes Agent app (hermesagent) installed for the same Olares user.
    - Upstream project: https://github.com/nesquena/hermes-webui (MIT)
  developer: Aimighty
  website: https://github.com/bayerhazard/wings-for-hermes
  sourceCode: https://github.com/bayerhazard/wings-for-hermes
  locale:
    - en-US
  supportArch:
    - amd64
  limitedCpu: 4
  requiredCpu: 1
  requiredMemory: 2Gi
  limitedMemory: 8Gi
  requiredDisk: 5Gi
  limitedDisk: 20Gi
permission:
  appData: true
options:
  apiTimeout: 0
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
    - name: hermesagent
      version: '>=1.0.0'
      type: application
  allowMultipleInstall: false
envs:
  - envName: HERMES_WEBUI_PASSWORD
    required: false
    type: password
    editable: true
    applyOnChange: true
    description: "Optional app-level password for the Web UI (in addition to Olares SSO)."
  - envName: HERMES_WEBUI_DEFAULT_MODEL
    required: false
    default: "Agent"
    type: string
    editable: true
    applyOnChange: true
    description: "Default model name used for new chats."
